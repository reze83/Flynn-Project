version: "1.0"
permissions:
  shell:
    allow:
      - "git *"
      - "pnpm *"
      - "npm *"
      - "uv *"
      - "node *"
      - "python *"
      - "ls *"
      - "cat *"
      - "grep *"
      - "find *"
      - "mkdir *"
      - "touch *"
      - "cp *"
      - "mv *"
    deny:
      - "rm -rf /"
      - "rm -rf /*"
      - "sudo *"
      - "chmod 777 *"
      - "> /dev/sda*"
      - "mkfs *"
      - "dd if=*"
      - ":(){ :|:& };:"  # Fork bomb

  paths:
    writable:
      - "${XDG_DATA_HOME}/flynn"
      - "${XDG_CONFIG_HOME}/flynn"
      - "${PROJECT_ROOT}"
      - "${HOME}/.local/share/flynn"
      - "${HOME}/.config/flynn"
    readonly:
      - "/etc"
      - "/usr"
      - "/bin"
      - "/sbin"
      - "/lib"

  agents:
    max_iterations: 10
    timeout_seconds: 300
    max_tokens_per_request: 100000

  network:
    allow_outbound: true
    allowed_hosts:
      - "api.anthropic.com"
      - "api.openai.com"
      - "registry.npmjs.org"
      - "pypi.org"
      - "github.com"
      - "raw.githubusercontent.com"
